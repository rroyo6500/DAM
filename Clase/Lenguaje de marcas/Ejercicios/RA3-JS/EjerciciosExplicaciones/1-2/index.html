<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <img width="200"/>

    <script>
        // Eliminar atributo 'width' de la imagen
        let img = document.querySelector('img');
        img.removeAttribute('width');

        // Añadir imagen de google
        // Imagen de google en formato enlace:
        //img.setAttribute('src', 'https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png');

        // Ruta de la imagen descargada en la carpeta IMG:
        img.setAttribute('src', 'IMG\\Google.webp');

        // Añadimos un título a la imagen
        img.setAttribute('title', 'Logo de Google');

    </script>
</body>
</html>
