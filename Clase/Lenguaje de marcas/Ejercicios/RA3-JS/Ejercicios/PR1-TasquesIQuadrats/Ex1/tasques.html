<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="tasques.css">
</head>

<body>
    <form>
        <input type="text" id="tasca" name="tasca" placeholder="Descripció de la tasca">
        <input type="submit" id="afegir" name="afegir" value="Afegir tasca">
    </form>
    <h1>Llista de tasques</h1>
    <ol id="llista"></ol>

    <script>

        const form = document.querySelector('form');
        const input = document.querySelector('#tasca');
        const llista = document.querySelector('#llista');

        const button = document.querySelector('#afegir');

        let idAdder = 0;
        let taskCount = 0;
        button.addEventListener('click', function (event) {
            event.preventDefault();

            let tasca = input.value;
            if (tasca.trim() == '') {
                alert('La tasca no pot estar buida');
                return;
            }
            input.value = '';
            idAdder++;
            taskCount++;

            llista.innerHTML += `
            <div id="tasca-${idAdder}">
                <li>${tasca}</li>
                <button class="eliminar" onclick="removeTask('tasca-${idAdder}')">Eliminar</button>
            </div>`;

            updateTitleVisibility();
        });

        function removeTask(taskId) {
            const taskElement = document.getElementById(taskId);
            if (taskElement) {
                taskElement.remove();
                taskCount--;
            }

            updateTitleVisibility();
        }

        function updateTitleVisibility() {
            const title = document.querySelector('h1');
            if (taskCount > 0) {
                title.style.display = 'block';
            } else {
                title.style.display = 'none';
            }
        }

    </script>

</body>

</html>
